      - "6062:6060"

  pool-db:
    image: postgres:15-alpine
    container_name: pool-db
    restart: unless-stopped
    logging: *mining-logging
    command:
      - postgres
      - -c
      - shared_buffers=1GB
      - -c
      - effective_cache_size=10GB
      - -c
      - max_wal_size=2GB
      - -c
      - checkpoint_timeout=15min
    cpu_shares: 3072
   # blkio_config:
   #   weight: 900
    oom_score_adj: -800
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    ports:
      - "5432:5432"
    env_file:
      - ./asic-pool/.env
    volumes:
      - ./chain-data/postgres:/var/lib/postgresql/data
      - ./asic-pool/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    networks:
      - pool-net

networks:
  pool-net:
    driver: bridge
