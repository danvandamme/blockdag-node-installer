  # Keep HAProxy simple so it doesn't add JSON-RPC probe load on the miners.
  rpc-failover:
    image: haproxy:2.9-alpine
    container_name: rpc-failover
    restart: unless-stopped
    logging: *mining-logging
    cpu_shares: 2048
  #  blkio_config:
  #    weight: 800
    oom_score_adj: -700
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    networks:
      - pool-net
    ports:
      - "38131:38131"
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    depends_on:
      bdag-miner-node-1:
        condition: service_started
      bdag-miner-node-2:
        condition: service_started

  bdag-miner-node-1:
    image: ${BLOCKDAG_NODE_IMAGE:-nathanbdagengineering/bdag-gameday-binaries:mainnet}
    container_name: bdag-miner-node-1
    restart: unless-stopped
    logging: *mining-logging
    cpu_shares: 4096
  #  blkio_config:
  #    weight: 1000
    oom_score_adj: -900
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
    volumes:
      - ./chain-data/node1:/data
    environment:
      ROLLOUT_WINDOW: 30m
      HEALTH_MIN_PEERS: 1
      RPC_URL: "ws://127.0.0.1:18546"
      NODE_ARGS: >
        --p2ptcpport=8151
        --listen=0.0.0.0
        ${NODE1_ADDPEER_FLAGS:-}
        --rpclisten=0.0.0.0:38131
        --evm.http.port=18545
        --evm.http.addr=0.0.0.0
        --datadir=/data
        --notls
        --rpcuser=${NODE_RPC_USER:-test}
        --rpcpass=${NODE_RPC_PASS:-test}
        --rpcmaxclients=100
        --evm.http.api=eth,net,web3,txpool,debug
        --http.writetimeout=45s
        --http.idletimeout=45s
        --acctmode
        --modules=Blockdag,miner
        --evmenv="--rpc.allow-unprotected-txs --metrics --metrics.addr 0.0.0.0 --metrics.port 6060"
        --metrics
        --rpcmaxconcurrentreqs=${NODE_RPC_MAX_CONCURRENT:-500}
        --maxpeers=${NODE_MAX_PEERS:-350}
        --cache=${NODE_CACHE_MB:-1024}
        --dagcachesize=${NODE_DAG_CACHE:-2000}
        --bdcachesize=${NODE_BD_CACHE:-2000}
        --http.ratelimit=${NODE_HTTP_RATE_LIMIT:-1800}
        --http.rateburst=${NODE_HTTP_RATE_BURST:-3200}
        --evm.ws.port=18546
        --evm.ws.addr=0.0.0.0
        --miner
        --miningaddr=${MINING_ADDRESS}
    networks:
      - pool-net
    ports:
      - "8151:8151"
      - "6061:6060"

  bdag-miner-node-2:
