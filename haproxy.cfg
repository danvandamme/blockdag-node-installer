global
  log stdout format raw local0

defaults
  log global
  mode http
  option dontlognull
  timeout connect 5s
  timeout check 10s
  timeout client 1m
  timeout server 1m

# Internal stats page — only reachable via docker exec, not exposed to host.
# Dashboard reads it with: wget -qO- http://127.0.0.1:9999/;csv
listen stats
  bind *:9999
  mode http
  stats enable
  stats uri /
  no log

frontend blockdag_rpc
  bind *:38131
  default_backend blockdag_rpc_nodes

backend blockdag_rpc_nodes
  # IBD-aware health check: POST a getblocktemplate RPC call with Basic auth.
  # A node in Initial Block Download returns 200 with "downloading" in the body,
  # which triggers the second expect rule and marks it DOWN.
  # A frozen node holding its TCP port will time out → marked DOWN.
  # @@RPC_AUTH@@ is substituted with base64(NODE_RPC_USER:NODE_RPC_PASS) at install time.
  option httpchk POST /
  http-check send meth POST uri / hdr Content-Type "application/json" hdr Authorization "Basic @@RPC_AUTH@@" body "{\"jsonrpc\":\"1.0\",\"id\":\"hc\",\"method\":\"getblocktemplate\",\"params\":[{\"rules\":[]}]}"
  http-check expect ! rstatus ^5
  http-check expect ! string "downloading"
  # node1 = primary, node2 = hot standby.
  # fall 3 = mark DOWN after 3 missed checks (~15s)
  # rise 2 = restore after 2 good checks (~10s) — node1 auto-recovers as primary
  server node1 bdag-miner-node-1:38131 check inter 5s fall 3 rise 2
  server node2 bdag-miner-node-2:38131 check inter 5s fall 3 rise 2 backup
