global
  log stdout format raw local0

defaults
  log global
  mode http
  option dontlognull
  timeout connect 5s
  timeout check 10s
  timeout client 1m
  timeout server 1m

# Internal stats page — only reachable via docker exec, not exposed to host.
# Dashboard reads it with: wget -qO- http://127.0.0.1:9999/;csv
listen stats
  bind *:9999
  mode http
  stats enable
  stats uri /
  no log

frontend blockdag_rpc
  bind *:38131
  default_backend blockdag_rpc_nodes

backend blockdag_rpc_nodes
  # HTTP-level check: any non-5xx response (including 401 from the RPC auth gate)
  # means the node is alive.  A frozen node that still holds its TCP port open
  # will time out on the HTTP response and be marked DOWN.
  option httpchk GET /
  http-check expect ! rstatus ^5
  # node1 = primary, node2 = hot standby.
  # fall 3 = mark DOWN after 3 missed checks (~15s)
  # rise 2 = restore after 2 good checks (~10s) — node1 auto-recovers as primary
  server node1 bdag-miner-node-1:38131 check inter 5s fall 3 rise 2
  server node2 bdag-miner-node-2:38131 check inter 5s fall 3 rise 2 backup
